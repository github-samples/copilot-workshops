name: Build and deploy workshop site

# Builds the MkDocs site. Deploys to GitHub Pages on pushes to main.
# Pull requests run a build-only validation pass.

on:
  push:
    branches: [main]
    paths:
      - 'workshop-content/**'
      - 'partials/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'workshop-content/**'
      - 'partials/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Single in-flight deploy per branch; do not cancel an active deploy mid-flight.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build site (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs and extensions
        run: pip install -r requirements-docs.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
